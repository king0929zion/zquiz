name: zquiz
description: A black-and-white mobile memorization and quiz app with AI generation and grading for Chinese, chemistry, and physics.
publish_to: 'none'
version: 1.2.4+8

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  file_picker: ^8.1.2
  http: ^1.2.2
  shared_preferences: ^2.3.2
  lucide_icons_flutter: ^3.1.14

flutter:
  uses-material-design: true
  assets:
    - assets/data/zquiz_data.json

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
